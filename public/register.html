<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">ServerTLS</div>
    <nav class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="login.html">Iniciar sesión</a>
      <a href="register.html">Registrarse</a>
    </nav>
  </header>

  <main class="page-center">
    <section class="form-card">
      <h1>Crear cuenta</h1>
      <p class="subtitle">Regístrate para continuar con la aplicación.</p>

      <form id="registerForm" class="form">
        <div class="form-group">
          <label for="registerName">Nombre completo</label>
          <input type="text" id="registerName" placeholder="Tu nombre completo" required />
        </div>

        <div class="form-group">
          <label for="registerEmail">Correo electrónico</label>
          <input type="email" id="registerEmail" placeholder="ejemplo@correo.com" required />
        </div>

        <div class="form-group">
          <label for="registerPassword">Contraseña</label>
          <input type="password" id="registerPassword" placeholder="Crea una contraseña" required />
        </div>

        <div class="form-group">
          <label for="registerRole">Rol</label>
          <select id="registerRole">
            <option value="user">Usuario</option>
            <option value="admin">Administrador</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary full-width">Registrarse</button>
      </form>

      <p id="registerMessage" class="message"></p>

      <div class="form-footer">
        <span>¿Ya tienes cuenta?</span>
        <a href="login.html">Iniciar sesión</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
