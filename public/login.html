<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">ServerTLS</div>
    <nav class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="login.html">Iniciar sesión</a>
      <a href="register.html">Registrarse</a>
    </nav>
  </header>

  <main class="page-center">
    <section class="form-card">
      <h1>Iniciar sesión</h1>
      <p class="subtitle">Ingresa tus credenciales para acceder a la plataforma.</p>

      <form id="loginForm" class="form">
        <div class="form-group">
          <label for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" placeholder="ejemplo@correo.com" required />
        </div>

        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" placeholder="Ingresa tu contraseña" required />
        </div>

        <button type="submit" class="btn btn-primary full-width">Entrar</button>
      </form>

      <p id="loginMessage" class="message"></p>

      <div class="form-footer">
        <span>¿No tienes cuenta?</span>
        <a href="register.html">Crear una</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
